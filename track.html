<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Shipment | DH Logistics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f7fa;
}

header{
background:#003366;
color:#fff;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.container{
max-width:700px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
margin-bottom:15px;
color:#003366;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
margin-top:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#ff9900;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
transition:.3s;
}

button:hover{
background:#e68a00;
}

#result{
margin-top:30px;
display:none;
background:#eef5ff;
padding:20px;
border-radius:8px;
}

.success{
color:green;
}

.error{
color:red;
}

.status{
margin-top:20px;
}

.step{
padding:12px;
margin-bottom:10px;
border-left:5px solid #003366;
background:white;
}

footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#003366;
color:white;
}

</style>

</head>

<body>

<header>

<h1>DH Logistics</h1>

<p>Worldwide Cargo & Shipment Tracking</p>

</header>

<div class="container">

<h2>Track Your Shipment</h2>

<p>Enter your tracking number below.</p>

<input
type="text"
id="trackingNumber"
placeholder="Example: DH123456">

<button onclick="trackShipment()">

TRACK SHIPMENT

</button>

<div id="result"></div>

</div>

<footer>

© 2026 DH Logistics. All Rights Reserved.

</footer>

<script>

function trackShipment(){

let tracking=document.getElementById("trackingNumber").value.trim().toUpperCase();

let result=document.getElementById("result");

const shipments={

"DH123456":{

status:"In Transit",

origin:"Lagos, Nigeria",

destination:"London, United Kingdom",

weight:"25 KG",

carrier:"DH Logistics Air Cargo",

expected:"18 July 2026"

},

"DH654321":{

status:"Delivered",

origin:"New York, USA",

destination:"Abuja, Nigeria",

weight:"12 KG",

carrier:"DH Logistics Express",

expected:"Delivered Successfully"

},

"DH987654":{

status:"Processing",

origin:"Shanghai, China",

destination:"Berlin, Germany",

weight:"80 KG",

carrier:"DH Logistics Ocean Freight",

expected:"22 July 2026"

}

};

if(shipments[tracking]){

let s=shipments[tracking];

result.style.display="block";

result.innerHTML=`

<h2 class="success">Shipment Found</h2>

<hr><br>

<p><strong>Tracking Number:</strong> ${tracking}</p>

<p><strong>Status:</strong> ${s.status}</p>

<p><strong>Carrier:</strong> ${s.carrier}</p>

<p><strong>Weight:</strong> ${s.weight}</p>

<p><strong>Origin:</strong> ${s.origin}</p>

<p><strong>Destination:</strong> ${s.destination}</p>

<p><strong>Estimated Delivery:</strong> ${s.expected}</p>

<br>

<h3>Shipment Progress</h3>

<div class="status">

<div class="step">✅ Shipment Received</div>

<div class="step">✅ Package Processed</div>

<div class="step">🚚 In Transit</div>

<div class="step">📦 Out For Delivery</div>

<div class="step">🏠 Delivered</div>

</div>

`;

}

else{

result.style.display="block";

result.innerHTML=`

<h2 class="error">

Tracking Number Not Found

</h2>

<p>

The tracking number you entered does not exist.

</p>

<p>

Please check the number and try again.

</p>

`;

}

}

</script>

</body>
</html>
