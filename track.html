<script type="module">

import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

window.trackShipment = async function(){

const trackingNumber = document
.getElementById("trackingNumber")
.value
.trim()
.toUpperCase();

const result = document.getElementById("result");

if(!trackingNumber){
result.style.display="block";
result.innerHTML="<h2>Please enter a tracking number.</h2>";
return;
}

const docRef = doc(db,"shipments",trackingNumber);

const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const s = docSnap.data();

result.style.display="block";

result.innerHTML=`
<h2>${s.trackingNumber}</h2>

<p><strong>Status:</strong>
<span class="status">${s.status}</span></p>

<p><strong>Sender:</strong> ${s.sender}</p>

<p><strong>Receiver:</strong> ${s.receiver}</p>

<p><strong>Origin:</strong> ${s.origin}</p>

<p><strong>Destination:</strong> ${s.destination}</p>

<p><strong>Current Location:</strong> ${s.currentLocation}</p>

<p><strong>Weight:</strong> ${s.weight}</p>

<p><strong>Last Updated:</strong> ${s.lastUpdated}</p>

`;
}
else{

result.style.display="block";

result.innerHTML=`
<h2>Tracking Number Not Found</h2>

<p>Please check the tracking number and try again.</p>
`;

}

}

</script>
